<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Book — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/books.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="form-page">
    <h1>Edit <span>Book</span></h1>
    <div class="form-card">
      <div id="editBookMessage" class="message"></div>
      <form id="editBookForm" novalidate>
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" required>
          <div class="field-error" id="titleError">Title is required.</div>
        </div>
        <div class="form-group">
          <label for="author">Author</label>
          <input type="text" id="author" required>
          <div class="field-error" id="authorError">Author is required.</div>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" placeholder="e.g. Fiction, Science">
        </div>
        <div class="form-group">
          <label for="isbn">ISBN</label>
          <input type="text" id="isbn">
        </div>
        <div class="form-group">
          <label for="copies">Copies</label>
          <input type="number" id="copies" min="1">
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Brief description of the book..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" id="editBookBtn">Update Book</button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LibraSys. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
