<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users — LibraSys Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/books.css">
  <style>
    .users-page { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .users-page h1 { margin-bottom: 1.5rem; }
    .users-page h1 span { color: var(--gold); }

    .search-bar {
      display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    }
    .search-bar input {
      flex: 1; min-width: 220px; padding: 0.6rem 1rem;
      border: 1.5px solid #ddd; border-radius: 8px; font-family: inherit;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--gold); }

    .badge-role { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.76rem; font-weight: 600; }
    .badge-admin { background: #fdecea; color: var(--danger); }
    .badge-user  { background: #e8f4fd; color: #1a6fb5; }
    .btn-xs { padding: 0.25rem 0.7rem; font-size: 0.78rem; border-radius: 5px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="users-page">
    <h1>Manage <span>Users</span></h1>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name or username...">
    </div>

    <div id="globalMessage" class="message" style="display:none; margin-bottom:1rem;"></div>

    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="4" style="text-align:center;padding:2rem;">
            <div class="spinner-container"><div class="spinner"></div></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer><p>&copy; 2026 LibraSys. All rights reserved.</p></footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const token = localStorage.getItem('token')
      const role = localStorage.getItem('role')
      if (!token || role !== 'admin') { window.location.href = 'login.html'; return; }

      let currentPage = 1
      let currentSearch = ''
      let totalPages = 1
      let currentTotal = 0
      const perPage = 15

      function showGlobalMsg(text, type) {
        const el = document.getElementById('globalMessage')
        el.textContent = text
        el.className = 'message ' + type
        el.style.display = 'block'
        setTimeout(() => el.style.display = 'none', 4000)
      }

      function renderTable(users) {
        const tbody = document.getElementById('usersBody')
        if (users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--gray);">No users found.</td></tr>'
          return
        }

        tbody.innerHTML = users.map(u => {
          const roleBadge = u.role === 'admin'
            ? '<span class="badge badge-role badge-admin">Admin</span>'
            : '<span class="badge badge-role badge-user">User</span>'

          const newRole = u.role === 'admin' ? 'user' : 'admin'
          const toggleLabel = u.role === 'admin' ? 'Demote to User' : 'Promote to Admin'

          return `
            <tr>
              <td><strong>${u.name || '—'}</strong></td>
              <td>@${u.username}</td>
              <td>${roleBadge}</td>
              <td>
                <div class="actions" style="gap: 0.4rem;">
                  <button class="btn btn-secondary btn-xs" onclick="toggleRole('${u.id}','${newRole}')">${toggleLabel}</button>
                  <a href="borrow-records.html?userId=${u.id}" class="btn btn-secondary btn-xs">Borrows</a>
                  <button class="btn btn-danger btn-xs" onclick="deleteUser('${u.id}')">Delete</button>
                </div>
              </td>
            </tr>`
        }).join('')
      }

      function renderPagination() {
        const wrapper = document.querySelector('.admin-table-wrapper')
        if (!wrapper) return

        const existing = document.getElementById('userPagination')
        if (existing) existing.remove()

        if (totalPages <= 1) return

        const nav = document.createElement('div')
        nav.id = 'userPagination'
        nav.style.cssText = 'display:flex;justify-content:center;align-items:center;gap:0.5rem;margin-top:1rem;'

        const prev = document.createElement('button')
        prev.className = 'btn btn-secondary btn-xs'
        prev.textContent = '‹ Prev'
        prev.disabled = currentPage <= 1
        prev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadUsers(currentPage) } })
        nav.appendChild(prev)

        const info = document.createElement('span')
        info.style.cssText = 'font-size:0.9rem;color:var(--gray);padding:0 0.8rem;'
        info.textContent = `Page ${currentPage} of ${totalPages} (${currentTotal} total)`
        nav.appendChild(info)

        const next = document.createElement('button')
        next.className = 'btn btn-secondary btn-xs'
        next.textContent = 'Next ›'
        next.disabled = currentPage >= totalPages
        next.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; loadUsers(currentPage) } })
        nav.appendChild(next)

        wrapper.parentNode.insertBefore(nav, wrapper.nextSibling)
      }

      async function loadUsers(page = 1) {
        try {
          const params = new URLSearchParams()
          if (page > 1) params.set('page', page)
          if (perPage !== 20) params.set('limit', perPage)
          if (currentSearch) params.set('search', currentSearch)

          const qs = params.toString()
          const res = await apiFetch(`/users${qs ? '?' + qs : ''}`)
          currentPage = res.page
          totalPages = res.pages
          currentTotal = res.total
          renderTable(res.data)
          renderPagination()
        } catch (err) {
          document.getElementById('usersBody').innerHTML =
            `<tr><td colspan="4" style="text-align:center;color:var(--danger);padding:2rem;">${err.message}</td></tr>`
        }
      }

      function onSearchChange() {
        currentSearch = document.getElementById('searchInput').value.trim()
        currentPage = 1
        loadUsers(1)
      }

      window.toggleRole = async function (id, newRole) {
        try {
          const res = await apiFetch(`/users/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ role: newRole })
          })
          showGlobalMsg(`User role changed to ${res.role}`, 'success')
          loadUsers()
        } catch (err) {
          showGlobalMsg(err.message, 'error')
        }
      }

      window.deleteUser = async function (id) {
        if (!confirm('Are you sure you want to delete this user?')) return
        try {
          await apiFetch(`/users/${id}`, { method: 'DELETE' })
          showGlobalMsg('User deleted successfully', 'success')
          loadUsers()
        } catch (err) {
          showGlobalMsg(err.message, 'error')
        }
      }

      document.getElementById('searchInput').addEventListener('input', debounce(onSearchChange, 300))
      loadUsers()

      function debounce(fn, ms) {
        let timer
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms) }
      }
    })()
  </script>
</body>
</html>
