<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/books.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="books-page">
    <h1>Browse <span>Books</span></h1>

    <div class="books-toolbar">
      <input type="text" id="searchInput" placeholder="Search by title or author...">
      <select id="categoryFilter">
        <option value="">All Categories</option>
      </select>
    </div>

    <div id="booksContainer" class="books-grid">
      <div class="spinner-container"><div class="spinner"></div></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LibraSys. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/books.js"></script>
</body>
</html>
