<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LibraSys</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/books.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Libra<span>Sys</span></div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
  </nav>

  <div class="form-page">
    <h1>Login to <span>LibraSys</span></h1>
    <div class="form-card">
      <div id="loginMessage" class="message"></div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter your username">
          <div class="field-error" id="usernameError">Username is required.</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
          <div class="field-error" id="passwordError">Password is required.</div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
      </form>
      <p style="margin-top: 1.5rem; text-align: center; color: var(--gray);">
        Don't have an account? <a href="register.html" style="color: var(--gold); font-weight: 500;">Register here</a>
      </p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LibraSys. All rights reserved.</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const messageEl = document.getElementById("loginMessage");
      messageEl.style.display = "none";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      let valid = true;
      document.querySelectorAll(".field-error").forEach((el) => (el.style.display = "none"));

      if (!username) {
        document.getElementById("usernameError").style.display = "block";
        valid = false;
      }
      if (!password) {
        document.getElementById("passwordError").style.display = "block";
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.textContent = "Logging in...";

      try {
        const response = await apiFetch("/login", {
          method: "POST",
          body: JSON.stringify({ username, password }),
        });

        localStorage.setItem("token", response.token);
        localStorage.setItem("username", response.username);
        localStorage.setItem("name", response.name || response.username);
        localStorage.setItem("role", response.role);

        messageEl.textContent = "Login successful! Redirecting...";
        messageEl.className = "message success";
        messageEl.style.display = "block";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      } catch (err) {
        messageEl.textContent = err.message;
        messageEl.className = "message error";
        messageEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
